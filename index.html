    <!-- PASS CODE PASS CODEPASS CODE PASS CODEPASS CODE PASS CODEPASS CODE PASS CODE  -->
    <script>
        /* ================================
           RAM PORTAL ACCESS CONTROL v2.0
        ================================ */

        const RAM_CONFIG = {
            PASSKEY: "RAMPP01",
            EXPIRY_HOURS: 24,
            MAX_ATTEMPTS: 5,
            LOCK_TIME_MINUTES: 10
        };

        /* ===== CHECK ACCESS ===== */
        function checkPass() {
            const input = document.getElementById("passkey").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            let attempts = parseInt(localStorage.getItem("ram_attempts")) || 0;
            let lockTime = localStorage.getItem("ram_lock");

            // 🔒 Check if locked
            if (lockTime && Date.now() < lockTime) {
                errorMsg.innerText = "Too many attempts. Try later.";
                errorMsg.style.display = "block";
                return;
            }

            if (input === RAM_CONFIG.PASSKEY) {

                // ✅ SUCCESS
                localStorage.setItem("ram_access", Date.now());
                localStorage.removeItem("ram_attempts");
                localStorage.removeItem("ram_lock");

                fadeOutOverlay();

            } else {

                // ❌ FAIL
                attempts++;
                localStorage.setItem("ram_attempts", attempts);

                errorMsg.innerText = "Invalid passkey";
                errorMsg.style.display = "block";
                errorMsg.style.animation = "shake 0.3s";

                // 🔒 Lock after max attempts
                if (attempts >= RAM_CONFIG.MAX_ATTEMPTS) {
                    const lockUntil = Date.now() + RAM_CONFIG.LOCK_TIME_MINUTES * 60 * 1000;
                    localStorage.setItem("ram_lock", lockUntil);
                    errorMsg.innerText = "Locked for 10 minutes";
                }
            }
        }

        /* ===== FADE EFFECT ===== */
        function fadeOutOverlay() {
            const overlay = document.getElementById("introOverlay");
            overlay.style.opacity = "0";

            setTimeout(() => {
                overlay.style.display = "none";
            }, 400);
        }

        /* ===== AUTO LOGIN CHECK ===== */
        function checkSavedAccess() {
            const saved = localStorage.getItem("ram_access");

            if (saved) {
                const validDuration = RAM_CONFIG.EXPIRY_HOURS * 60 * 60 * 1000;

                if (Date.now() - saved < validDuration) {
                    document.getElementById("introOverlay").style.display = "none";
                } else {
                    localStorage.removeItem("ram_access");
                }
            }
        }

        /* ===== INIT ===== */
        window.onload = function () {

            checkSavedAccess();

            const input = document.getElementById("passkey");

            // ENTER key
            input.addEventListener("keypress", function (e) {
                if (e.key === "Enter") checkPass();
            });

            // Auto focus
            input.focus();
        };
    </script>
    <!-- end PASS CODE PASS CODE -->

<body>
    <script>
        function checkPass() {
            var input = document.getElementById("passkey").value.trim();
            var now = new Date().getTime();

            if (input === "RAMPP01") {

                /* ===== CHOOSE MODE BELOW ===== */

                // OPTION 1: One-time (forever)
                // localStorage.setItem("ram_access", "granted");

                // OPTION 2: Daily (24h)
                localStorage.setItem("ram_access_expiry", now + (24 * 60 * 60 * 1000));

                // OPTION 3: Weekly (7 days)
                // localStorage.setItem("ram_access_expiry", now + (7 * 24 * 60 * 60 * 1000));

                document.getElementById("introOverlay").style.display = "none";

            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        /* ===== CHECK ACCESS ON LOAD ===== */
        window.onload = function () {
            var expiry = localStorage.getItem("ram_access_expiry");
            var now = new Date().getTime();

            if (expiry && now < expiry) {
                document.getElementById("introOverlay").style.display = "none";
            }
        };

        /* ===== ENTER KEY SUPPORT ===== */
        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("passkey").addEventListener("keypress", function (e) {
                if (e.key === "Enter") {
                    checkPass();
                }
            });
        });
    </script>
