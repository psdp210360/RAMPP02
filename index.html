        #introOverlay {

            display: flex;

            justify-content: center;

            padding: 40px;
            border-radius: 14px;
            text-align: center;
            width: 340px;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

    <!-- PASSKEY  -->
    <script>
        /* ===== RAM ACCESS SYSTEM (FINAL CLEAN) ===== */

        const PASSKEY = "RAMPP01";
        const EXPIRY_HOURS = 24;

        function checkPass() {
            const input = document.getElementById("passkey").value.trim();
            const errorMsg = document.getElementById("errorMsg");


            if (input === PASSKEY) {

                localStorage.setItem("ram_access", Date.now());

                const overlay = document.getElementById("introOverlay");

                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";   // 🔥 ADD THIS

                setTimeout(() => {
                    overlay.style.display = "none";
                }, 300);

                overlay.style.opacity = "0";
                overlay.style.pointerEvents = "none";   // 🔥 IMPORTANT

                setTimeout(() => {
                    overlay.style.display = "none";
                }, 300);

            } else {
                errorMsg.style.display = "block";
            }
        }

        window.onload = function () {

            const saved = localStorage.getItem("ram_access");

            // Auto الدخول لو خلال 24 ساعة
            if (saved && (Date.now() - saved < EXPIRY_HOURS * 60 * 60 * 1000)) {
                const overlay = document.getElementById("introOverlay");
                overlay.style.display = "none";
                overlay.style.pointerEvents = "none";   // 🔥 THIS IS THE FIX
            }

            const input = document.getElementById("passkey");

            if (input) {
                input.addEventListener("keypress", function (e) {
                    if (e.key === "Enter") checkPass();
                });

                input.focus();
            }
        };
    </script>
