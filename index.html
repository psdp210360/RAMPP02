<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="../style.css">

<head>
    <!-- Script calling pages into the right block  -->
    <style>
        /* ===== FULLSCREEN LOCK ===== */
        #introOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: linear-gradient(135deg, #1f3a5f, #2c5282);
            display: flex;
            align-items: center;
            justify-content: center;

            z-index: 99999;
        }

        /* ===== BOX ===== */
        .intro-box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            text-align: center;
            width: 340px;

            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        /* ===== INPUT ===== */
        .intro-box input {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        /* ===== BUTTON ===== */
        .intro-box button {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            border: none;
            background: #2c5282;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .intro-box button:hover {
            background: #1f3a5f;
        }

        /* ===== ERROR ===== */
        #errorMsg {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }
    </style>
    <script>
        function checkPass() {
            var input = document.getElementById("passkey").value.trim();

            if (input === "RAMPP01") {
                document.getElementById("introOverlay").style.display = "none";
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        /* ENTER key support */
        document.getElementById("passkey").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                checkPass();
            }
        });
    </script>
    <script>
        function checkPass() {
            var input = document.getElementById("passkey").value.trim();

            if (input === "RAMPP01") {
                localStorage.setItem("ram_access", "granted");
                document.getElementById("introOverlay").style.display = "none";
            } else {
                document.getElementById("errorMsg").style.display = "block";
            }
        }

        window.onload = function () {
            if (localStorage.getItem("ram_access") === "granted") {
                document.getElementById("introOverlay").style.display = "none";
            }
        };
    </script>

    <meta charset="UTF-8">
    <title>RAM Portal</title>

    <!-- end script calling pages -->
    <meta charset="UTF-8">
    <title>RAM Policies & Procedures Portal</title>
    <style>
        :root {
            --ram-dark-blue: #1f3a5f;
            /* consistent dark blue */
        }

        /* GENERAL */
        body {
            margin: 0;
            font-family: Arial;
        }

        /* HEADER */
        header {
            background: var(--ram-dark-blue);
            color: white;
            padding: 12px 20px;
        }

        /* FOOTER */
        footer {
            background: var(--ram-dark-blue);
            color: white;
            text-align: center;
            padding: 10px;
        }

        /* TOP MENU */
        .menu {
            background: #3b6ea5;
            /* lighter blue */
            padding: 10px;
        }

        .menu a {
            color: white;
            margin-right: 15px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: #ffffff;
            padding: 10px;
            border-bottom: 2px solid #ccc;
            display: flex;
            align-items: center;
        }

        header img {
            height: 60px;
            margin-right: 15px;
        }

        header h2 {
            color: #0b2545;
        }

        .topmenu {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        .topmenu a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
        }

        .container {
            display: flex;
            height: 80vh;
        }

        .sidebar {
            width: 280px;
            background: #1e1e2f;
        }

        .content {
            flex: 1;
        }

        footer {
            background: #09192f;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>

    <script>
        function loadPage(page) {
            document.getElementById("mainFrame").src = page;
        }
    </script>

</head>

<body>
    <!-- PASSKEY -->
    <div id="introOverlay">
        <div class="intro-box">
            <h1>RAM Portal</h1>
            <p>Policies & Procedures Knowledge Hub</p>

            <input type="password" id="passkey" placeholder="Enter Access Key" />
            <button onclick="checkPass()">Enter</button>

            <div id="errorMsg">Invalid passkey</div>
        </div>
    </div>
    <!-- PASSKEY -->

    <header>
        <img src="assets/logo.png">
        <h2>RAM Policies and Procedures Manual and Knowledge Hub</h2>
    </header>

    <!-- HORIZONTAL MENU -->
    <div class="topmenu">

        <!-- FILE -->
        <a href="#">File</a>

        <!-- EDIT -->
        <a href="#">Edit</a>

        <!-- VIEW -->
        <a href="#">View</a>

        <!-- BUILDING BLOCKS -->
        <a href="#" onclick="loadPage('pages/building_blocks.html')">Building Blocks</a>

        <!-- HELP -->
        <a href="#" onclick="loadPage('pages/help.html')">Help</a>

        <!-- ABOUT -->
        <a href="#" onclick="loadPage('pages/about.html')">About</a>

        <!-- HOME -->
        <a href="index.html">Home</a>


    </div>

    <div class="container">

        <!-- LEFT MENU -->
        <div class="sidebar">
            <iframe src="menu.html" style="width:100%; height:100%; border:none;"></iframe>
        </div>

        <!-- RIGHT CONTENT (THIS IS WHERE mainFrame GOES) -->
        <div class="content">
            <iframe id="mainFrame" src="pages/home.html" style="width:100%; height:100%; border:none;">
            </iframe>
        </div>

    </div>
    <!-- FOOTER -->
    <footer>
        <a href="index.html" style="color:white;">Home Page</a> |
        RAM Governance Portal | RAM-PROC-00
    </footer>

</body>
<script>
    function checkPass() {
        var input = document.getElementById("passkey").value;

        if (input === "RAMPP01") {
            document.getElementById("introOverlay").style.display = "none";
        } else {
            document.getElementById("errorMsg").style.display = "block";
        }
    }

    /* Optional: press Enter to submit */
    document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            checkPass();
        }
    });
</script>

</html>
