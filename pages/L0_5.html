<!DOCTYPE html>
<html>
<link rel="stylesheet" href="../style.css">

<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f6f8;
        }

        .header {
            background: #1f3a5f;
            color: white;
            padding: 15px;
            border-radius: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .card {
            background: white;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .card:hover {
            background: #eaf1f8;
        }
    </style>
    <script>
        function go(p) { parent.loadPage(p); }
    </script>
</head>

<body>

    <div class="header">
        <h2>5. Corporate Services (Enablers)</h2>
        <p><strong>Purpose:</strong> Support and control the business</p>
        <p>Key processes under this domain</p>
    </div>

    <div class="card" onclick="parent.loadPage('pages/home.html')">
        🔙 Back to Home
    </div>

    <div class="grid">
        <div class='card'>5.1 Finance (GL, AP, reporting)</div>
        <div class='card'>5.2 Supply Chain Management (procurement, vendors)</div>
        <div class='card'>5.3 Human Resources</div>
        <div class='card'>5.4 Information Technology</div>
        <div class='card'>5.5 Legal</div>
        <div class='card'>5.6 Risk & Compliance</div>
    </div>

</body>

</html>
