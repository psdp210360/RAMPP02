<!DOCTYPE html>
<html>
<head>
<title>Portfolio Strategy</title>
<script src="../form_base.js"></script>

<style>
body { font-family:Arial; background:#f4f6f8; padding:20px; }
.container { background:white; padding:20px; border-radius:10px; max-width:800px; margin:auto; }
h2 { color:#1f3a5f; }
input, textarea, select { width:100%; margin-bottom:10px; padding:8px; }
.actions { display:flex; gap:10px; }
button { padding:10px; border:none; border-radius:5px; cursor:pointer; }
.primary { background:#1f3a5f; color:white; }
.secondary { background:#6c757d; color:white; }
</style>

</head>

<body onload="loadForm('FORM-1-1.1-01')">

<div class="container">

<h2>FORM-1-1.1-01 Portfolio Strategy</h2>

<label>Portfolio Objective</label>
<textarea name="objective"></textarea>

<label>Target Asset Mix</label>
<input name="asset_mix">

<label>Risk Profile</label>
<select name="risk">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<label>Geographic Focus</label>
<input name="geo">

<label>Expected IRR (%)</label>
<input name="irr" type="number">

<div class="actions">
<button class="primary" onclick="saveForm('FORM-1-1.1-01')">Save</button>
<button class="secondary" onclick="exportPDF()">PDF</button>
<button class="secondary" onclick="shareForm()">Share</button>
</div>

</div>
</body>
</html>
