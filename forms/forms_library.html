<!DOCTYPE html>
<html>
<head>
<title>RAM Forms Library</title>
<style>
body { font-family: Arial; background:#eef2f7; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; }
.card {
    background:white; padding:15px;
    border-left:5px solid #1f3a5f;
    border-radius:8px; cursor:pointer;
}
</style>

<script>
function openForm(path){
    window.location.href = path;
}
</script>
</head>

<body>

<h2>📁 RAM Forms Library</h2>

<h3>L0-2 Investment</h3>

<div class="card" onclick="openForm('FORM-2-2.3-01.html')">

</div>

<div class="card" onclick="openForm('FORM-2-2.2-01.xlsx')">

</div>

</div>

</body>
</html>
